name: GitHub Stats Cards

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate custom commit languages SVG
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN_PRIVATE }}
          USERNAME: IchBinArtem
        run: |
          pip install requests -q
          python scripts/generate_commit_langs.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile-summary-card-output/
          git diff --staged --quiet || git commit -m "chore: update stats cards"
          git push
